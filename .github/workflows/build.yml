name: SearxGo Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git ${{ github.workspace }}/depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH

      - name: Configurar GClient
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          gclient config --name src https://github.com/brave/brave-browser --unmanaged
          gclient sync --no-history --shallow --nohooks

      - name: Escrever args.gn
        run: |
          mkdir -p src/out/arm64
          cat > src/out/arm64/args.gn << 'EOF'
          target_os = "android"
          target_cpu = "arm64"
          is_debug = false
          is_official_build = true
          is_component_build = false
          symbol_level = 0
          brave_rewards_enabled = false
          brave_wallet_enabled = false
          brave_news_enabled = false
          safe_browsing_mode = 0
          enable_reporting = false
          enable_crash_reporter = false
          use_official_google_api_keys = false
          enable_remoting = false
          disable_fieldtrial_testing_config = true
          EOF

      - name: Build
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          cd src
          gn gen out/arm64
          autoninja -C out/arm64 chrome_public_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-apk
          path: src/out/arm64/apks/ChromePublic.apk
