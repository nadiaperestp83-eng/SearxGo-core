name: SearxGo Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      # ============================================================
      # 1. LIBERAR ESPAÇO EM DISCO (ANTES DE QUALQUER DOWNLOAD)
      # ============================================================
      - name: Free disk space
        run: |
          echo "=== Espaço antes da limpeza ==="
          df -h /

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /opt/microsoft
          sudo rm -rf /opt/pipx
          sudo rm -rf /opt/az
          sudo rm -rf /opt/google/chrome
          sudo rm -rf /usr/share/az*
          sudo rm -rf /usr/share/maven
          sudo rm -rf /usr/share/gradle
          sudo rm -rf /usr/share/texlive
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/java
          sudo apt-get clean
          sudo apt-get autoremove -y
          docker system prune -af || true

          echo "=== Espaço após a limpeza ==="
          df -h /

      # ============================================================
      # 2. INSTALAÇÃO DE DEPENDÊNCIAS BÁSICAS
      # ============================================================
      - name: Install Python 3.11 e dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y \
            python3.11 \
            python3.11-distutils \
            python3.11-venv \
            build-essential \
            git \
            curl \
            lsb-release \
            openjdk-17-jdk \
            lib32stdc++6 \
            lib32z1 \
            pkg-config \
            unzip \
            nodejs \
            npm
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --set python3 /usr/bin/python3.11
          python3 --version

      # ============================================================
      # 3. DEPOT_TOOLS + GN (sem git clone, para evitar prompts)
      # ============================================================
      - name: Setup depot_tools e GN binário
        run: |
          # Usamos tarball para evitar interação com git
          rm -rf $HOME/depot_tools
          curl -s https://storage.googleapis.com/chrome-infra/depot_tools.zip -o /tmp/depot_tools.zip
          unzip -q /tmp/depot_tools.zip -d $HOME
          rm -f $HOME/depot_tools/gn
          curl -sL "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest" \
            -o /tmp/gn.zip
          unzip -qo /tmp/gn.zip -d $HOME/depot_tools
          chmod +x $HOME/depot_tools/gn
          echo "$HOME/depot_tools" >> $GITHUB_PATH
          export PATH="$HOME/depot_tools:$PATH"
          gn --version
          gclient --version

      # ============================================================
      # 4. DETECTAR VERSÃO DO CHROMIUM USADA PELO BRAVE
      # ============================================================
      - name: Clonar brave-browser para pegar versão correta do Chromium
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          git clone --depth=1 \
            https://github.com/brave/brave-browser.git \
            $HOME/brave-browser
          echo "=== package.json — versão chromium ==="
          cat $HOME/brave-browser/package.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          cfg = d.get('config', {})
          print('chromium_version:', cfg.get('projects', {}).get('chrome', {}).get('tag', 'N/A'))
          print('brave_core_ref:', cfg.get('projects', {}).get('brave-core', {}).get('ref', 'N/A'))
          "

      # ============================================================
      # 5. GERAR .gclient COM O SEU FORK (SearxGo-core)
      # ============================================================
      - name: Extrair versão Chromium e criar workspace
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0

          mkdir -p $HOME/searxgo-build
          cd $HOME/searxgo-build

          CHROMIUM_TAG=$(python3 -c "
          import json
          d = json.load(open('$HOME/brave-browser/package.json'))
          cfg = d.get('config', {})
          tag = cfg.get('projects', {}).get('chrome', {}).get('tag', '')
          print(tag)
          " 2>/dev/null)

          echo "CHROMIUM_TAG detectado: $CHROMIUM_TAG"

          cat > $HOME/searxgo-build/.gclient << GCLIENT
          solutions = [
            {
              "name": "src",
              "url": "https://chromium.googlesource.com/chromium/src.git@${CHROMIUM_TAG}",
              "managed": False,
              "custom_deps": {
                "src/brave": "https://github.com/nadiaperestp83-eng/SearxGo-core.git@master",
              },
              "custom_vars": {
                "checkout_android": True,
              },
            },
          ]
          target_os = ["android"]
          GCLIENT

          echo "=== .gclient gerado ==="
          cat $HOME/searxgo-build/.gclient
          echo "BUILD_DIR=$HOME/searxgo-build" >> $GITHUB_ENV

      # ============================================================
      # 6. SYNC (com menos jobs e sem --no-history para evitar erros)
      # ============================================================
      - name: gclient sync — Chromium + SearxGo-core
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/searxgo-build
          gclient sync \
            --no-history \
            --shallow \
            --delete_unversioned_trees \
            --reset \
            --nohooks \
            --jobs=4   # Menos paralelismo = menos arquivos temporários

      # ============================================================
      # 7. VERIFICAÇÃO E ESPAÇO DISPONÍVEL
      # ============================================================
      - name: Verificar estrutura src e espaço
        run: |
          echo "=== raiz src ==="
          ls -la $HOME/searxgo-build/src/ | head -30
          echo "=== .gn ==="
          test -f $HOME/searxgo-build/src/.gn \
            && echo ".gn ENCONTRADO OK" \
            || (echo ".gn NAO encontrado — abortando" && exit 1)
          echo "=== src/brave ==="
          ls $HOME/searxgo-build/src/brave/ | head -10 || echo "brave NAO existe"
          echo "=== Espaço em disco ==="
          df -h /

      - name: gclient runhooks
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/searxgo-build
          gclient runhooks

      # ============================================================
      # 8. CONFIGURAR args.gn (com opções para reduzir espaço)
      # ============================================================
      - name: Escrever args.gn (otimizado para espaço)
        run: |
          mkdir -p $HOME/searxgo-build/src/out/arm64
          cat > $HOME/searxgo-build/src/out/arm64/args.gn << 'EOF'
          target_os = "android"
          target_cpu = "arm64"
          android_channel = "stable"
          is_debug = false
          is_official_build = true
          is_component_build = false
          symbol_level = 0
          enable_resource_allowlist_generation = false
          enable_junit_tests = false
          enable_java_templates = false
          brave_rewards_enabled = false
          brave_wallet_enabled = false
          brave_news_enabled = false
          brave_sync_v2_enabled = false
          brave_vpn_enabled = false
          speedreader_enabled = false
          enable_reporting = false
          enable_crash_reporter = false
          enable_background_mode = false
          safe_browsing_mode = 0
          use_official_google_api_keys = false
          enable_google_now = false
          enable_remoting = false
          disable_omaha = true
          disable_fieldtrial_testing_config = true
          arm_use_neon = true
          use_thin_lto = true
          # Reduz ainda mais o espaço:
          is_cfi = false
          use_cxx_rtti = false
          use_custom_libcxx = false
          EOF

      # ============================================================
      # 9. BUILD COM NINJA LIMITADO A 2 JOBS (para evitar pico de espaço)
      # ============================================================
      - name: gn gen
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/searxgo-build/src
          gn gen out/arm64

      - name: Build chrome_public_apk (com -j 4)
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/searxgo-build/src
          # Usamos autoninja com -j 4 para limitar processos paralelos
          autoninja -C out/arm64 -j 4 chrome_public_apk

      # ============================================================
      # 10. UPLOAD
      # ============================================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-arm64-${{ github.sha }}
          path: $HOME/searxgo-build/src/out/arm64/apks/ChromePublic.apk
          retention-days: 7
