name: SearxGo Android Build

on:
  push:
    branches: [main]
  workflow_dispatch: # Adicionado para você disparar manualmente pela aba Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH

      - name: Configure gclient
        run: |
          gclient config --name src https://github.com/brave/brave-browser
          gclient sync --no-history --shallow --nohooks

      - name: GN Args
        run: |
          cd src
          gn gen out/arm64 --args='target_os="android" target_cpu="arm64" is_debug=false is_official_build=true brave_rewards_enabled=false brave_wallet_enabled=false brave_news_enabled=false safe_browsing_mode=0 enable_reporting=false enable_crash_reporter=false use_official_google_api_keys=false enable_remoting=false disable_fieldtrial_testing_config=true'

      - name: Build
        run: |
          cd src
          autoninja -C out/arm64 chrome_public_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-arm64
          path: src/out/arm64/apks/ChromePublic.apk
          if-no-files-found: error
