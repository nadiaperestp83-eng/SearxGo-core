name: SearxGo Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Python 3.11 e dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.11 python3.11-distutils python3.11-venv build-essential git curl lsb-release openjdk-17-jdk lib32stdc++6 lib32z1 pkg-config unzip
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --set python3 /usr/bin/python3.11

      - name: Setup depot_tools Manual
        run: |
          # 1. Clona o depot_tools
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git ${{ github.workspace }}/depot_tools
          
          # 2. Baixa o binário do GN direto do Google para resolver "gn.py: Unable to find gn"
          curl -sL https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest -o gn.zip
          unzip -q gn.zip -d ${{ github.workspace }}/depot_tools
          chmod +x ${{ github.workspace }}/depot_tools/gn
          
          # 3. Adiciona ao PATH
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH

      - name: Configurar gclient
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          cd ${{ github.workspace }}
          gclient config --name src https://github.com/brave/brave-browser --unmanaged

      - name: gclient sync
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          cd ${{ github.workspace }}
          gclient sync --no-history --shallow --delete_unversioned_trees --reset --nohooks --jobs=8

      - name: gclient runhooks
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          cd ${{ github.workspace }}
          gclient runhooks

      - name: Escrever args.gn
        run: |
          mkdir -p ${{ github.workspace }}/src/out/arm64
          cat > ${{ github.workspace }}/src/out/arm64/args.gn << 'EOF'
          target_os = "android"
          target_cpu = "arm64"
          is_debug = false
          is_official_build = true
          is_component_build = false
          symbol_level = 0
          strip_debug_info = true
          brave_rewards_enabled = false
          brave_wallet_enabled = false
          brave_news_enabled = false
          brave_sync_v2_enabled = false
          brave_vpn_enabled = false
          speedreader_enabled = false
          enable_reporting = false
          enable_crash_reporter = false
          enable_background_mode = false
          safe_browsing_mode = 0
          use_official_google_api_keys = false
          enable_google_now = false
          enable_remoting = false
          disable_omaha = true
          disable_fieldtrial_testing_config = true
          arm_use_neon = true
          use_thin_lto = true
          EOF

      - name: Build
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          cd ${{ github.workspace }}/src
          gn gen out/arm64
          autoninja -C out/arm64 chrome_public_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-arm64-${{ github.sha }}
          path: ${{ github.workspace }}/src/out/arm64/apks/ChromePublic.apk
          retention-days: 7
