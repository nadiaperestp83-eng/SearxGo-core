name: SearxGo Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install Python 3.11 e dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y \
            python3.11 \
            python3.11-distutils \
            python3.11-venv \
            build-essential \
            git \
            curl \
            lsb-release \
            openjdk-17-jdk \
            lib32stdc++6 \
            lib32z1 \
            pkg-config \
            unzip \
            nodejs \
            npm
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --set python3 /usr/bin/python3.11
          python3 --version

      - name: Setup depot_tools e GN binário
        run: |
          git clone --depth=1 \
            https://chromium.googlesource.com/chromium/tools/depot_tools.git \
            $HOME/depot_tools

          # Remove wrapper Python do gn e instala binário real
          rm -f $HOME/depot_tools/gn
          curl -sL "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest" \
            -o /tmp/gn.zip
          unzip -qo /tmp/gn.zip -d $HOME/depot_tools
          chmod +x $HOME/depot_tools/gn

          echo "$HOME/depot_tools" >> $GITHUB_PATH
          export PATH="$HOME/depot_tools:$PATH"
          gn --version
          gclient --version

      - name: Clonar brave-browser
        run: |
          git clone --depth=1 \
            https://github.com/brave/brave-browser.git \
            $HOME/brave-browser
          echo "--- Conteúdo de brave-browser ---"
          ls -la $HOME/brave-browser/

      - name: Localizar e patch do arquivo de dependências
        run: |
          cd $HOME/brave-browser
          echo "--- Arquivos na raiz ---"
          ls -la
          # O brave-browser usa package.json + script init que gera o .gclient
          # Substituímos a referência ao brave-core pelo nosso fork
          if [ -f "package.json" ]; then
            echo "package.json encontrado — fazendo patch"
            sed -i \
              's|brave/brave-core|nadiaperestp83-eng/SearxGo-core|g' \
              package.json
            cat package.json | grep -i "brave-core\|SearxGo" || true
          fi
          if [ -f "DEPS" ]; then
            echo "DEPS encontrado — fazendo patch"
            sed -i \
              's|brave/brave-core|nadiaperestp83-eng/SearxGo-core|g' \
              DEPS
          fi
          # Grava .gclient manualmente apontando para o nosso fork
          cat > $HOME/.gclient << 'EOF'
          solutions = [
            {
              "name": "src/brave",
              "url": "https://github.com/nadiaperestp83-eng/SearxGo-core.git@master",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
            },
          ]
          target_os = ["android"]
          EOF
          echo "--- .gclient gerado ---"
          cat $HOME/.gclient

      - name: npm install no brave-browser
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/brave-browser
          npm install --legacy-peer-deps || true

      - name: gclient sync
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          # Roda gclient na home onde está o .gclient
          cd $HOME
          gclient sync \
            --no-history \
            --shallow \
            --delete_unversioned_trees \
            --reset \
            --nohooks \
            --jobs=8

      - name: Verificar estrutura src
        run: |
          echo "--- Conteúdo de src ---"
          ls -la $HOME/src/ || echo "src não existe"
          test -f $HOME/src/.gn \
            && echo ".gn ENCONTRADO OK" \
            || echo ".gn NAO encontrado — pode estar em subdir"
          find $HOME/src -name ".gn" -maxdepth 3 2>/dev/null || true

      - name: gclient runhooks
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME
          gclient runhooks

      - name: Escrever args.gn
        run: |
          # Detecta onde está o src com o .gn
          SRC_DIR=$(find $HOME -name ".gn" -maxdepth 5 2>/dev/null | head -1 | xargs dirname)
          echo "SRC_DIR=$SRC_DIR" >> $GITHUB_ENV
          echo "src encontrado em: $SRC_DIR"
          mkdir -p "$SRC_DIR/out/arm64"
          cat > "$SRC_DIR/out/arm64/args.gn" << 'EOF'
          target_os = "android"
          target_cpu = "arm64"
          android_channel = "stable"
          is_debug = false
          is_official_build = true
          is_component_build = false
          symbol_level = 0
          strip_debug_info = true
          brave_rewards_enabled = false
          brave_wallet_enabled = false
          brave_news_enabled = false
          brave_sync_v2_enabled = false
          brave_vpn_enabled = false
          speedreader_enabled = false
          enable_reporting = false
          enable_crash_reporter = false
          enable_background_mode = false
          safe_browsing_mode = 0
          use_official_google_api_keys = false
          enable_google_now = false
          enable_remoting = false
          disable_omaha = true
          disable_fieldtrial_testing_config = true
          arm_use_neon = true
          use_thin_lto = true
          EOF

      - name: gn gen
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd "$SRC_DIR"
          gn gen out/arm64

      - name: Validar search_engines target
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd "$SRC_DIR"
          autoninja -C out/arm64 components/search_engines:search_engines

      - name: Build chrome_public_apk
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd "$SRC_DIR"
          autoninja -C out/arm64 chrome_public_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-arm64-${{ github.sha }}
          path: ${{ env.SRC_DIR }}/out/arm64/apks/ChromePublic.apk
          retention-days: 7
