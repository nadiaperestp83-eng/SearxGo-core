name: SearxGo Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      # Definimos o caminho fixo para o depot_tools dentro do workspace
      DEPOT_TOOLS: ${{ github.workspace }}/depot_tools
      PATH: ${{ github.workspace }}/depot_tools:${{ env.PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-pip git curl lsb-release openjdk-17-jdk

      - name: Clone depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git $DEPOT_TOOLS

      - name: Configurar gclient
        run: |
          # Configura o gclient apontando para o src dentro do workspace
          mkdir -p ${{ github.workspace }}/src
          cd ${{ github.workspace }}
          gclient config --name src https://github.com/brave/brave-browser --unmanaged
          gclient sync --no-history --shallow --nohooks --jobs 8

      - name: Escrever args.gn
        run: |
          mkdir -p ${{ github.workspace }}/src/out/arm64
          cat > ${{ github.workspace }}/src/out/arm64/args.gn << 'EOF'
          target_os = "android"
          target_cpu = "arm64"
          is_debug = false
          is_official_build = true
          brave_rewards_enabled = false
          brave_wallet_enabled = false
          brave_news_enabled = false
          safe_browsing_mode = 0
          enable_reporting = false
          enable_crash_reporter = false
          use_official_google_api_keys = false
          EOF

      - name: Build
        run: |
          cd ${{ github.workspace }}/src
          gn gen out/arm64
          autoninja -C out/arm64 chrome_public_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-apk
          path: src/out/arm64/apks/ChromePublic.apk
