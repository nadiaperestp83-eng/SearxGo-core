name: SearxGo Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install Python 3.11 e dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y \
            python3.11 \
            python3.11-distutils \
            python3.11-venv \
            build-essential \
            git \
            curl \
            lsb-release \
            openjdk-17-jdk \
            lib32stdc++6 \
            lib32z1 \
            pkg-config \
            unzip \
            nodejs \
            npm
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --set python3 /usr/bin/python3.11
          python3 --version

      - name: Setup depot_tools e GN binário
        run: |
          git clone --depth=1 \
            https://chromium.googlesource.com/chromium/tools/depot_tools.git \
            $HOME/depot_tools
          rm -f $HOME/depot_tools/gn
          curl -sL "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest" \
            -o /tmp/gn.zip
          unzip -qo /tmp/gn.zip -d $HOME/depot_tools
          chmod +x $HOME/depot_tools/gn
          echo "$HOME/depot_tools" >> $GITHUB_PATH
          export PATH="$HOME/depot_tools:$PATH"
          gn --version
          gclient --version

      - name: Clonar brave-browser e inspecionar estrutura real
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          git clone --depth=1 \
            https://github.com/brave/brave-browser.git \
            $HOME/brave-browser
          echo "=== RAIZ DO brave-browser ==="
          ls -la $HOME/brave-browser/
          echo "=== package.json ==="
          cat $HOME/brave-browser/package.json || echo "NAO EXISTE"
          echo "=== DEPS ==="
          cat $HOME/brave-browser/DEPS || echo "NAO EXISTE"
          echo "=== .gclient ==="
          cat $HOME/brave-browser/.gclient || echo "NAO EXISTE"

      - name: Rodar npm install + script init do brave-browser
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/brave-browser
          npm install --legacy-peer-deps
          echo "=== Scripts disponíveis ==="
          cat package.json | python3 -c "import sys,json; d=json.load(sys.stdin); [print(k,':',v) for k,v in d.get('scripts',{}).items()]"

      - name: Gerar .gclient via script init do brave-browser
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/brave-browser
          # brave-browser usa npm run init para gerar o .gclient e fazer sync
          # Interceptamos antes do sync para patch do brave-core
          npm run init -- --target_os=android || true
          echo "=== .gclient gerado ==="
          cat $HOME/brave-browser/.gclient 2>/dev/null \
            || cat $HOME/.gclient 2>/dev/null \
            || echo ".gclient NAO encontrado em nenhum lugar"
          echo "=== Procurando .gclient ==="
          find $HOME -name ".gclient" 2>/dev/null

      - name: Patch — substitui brave-core pelo SearxGo-core no .gclient
        run: |
          # Localiza o .gclient gerado
          GCLIENT_FILE=$(find $HOME -name ".gclient" 2>/dev/null | head -1)
          echo "Usando .gclient em: $GCLIENT_FILE"
          cat "$GCLIENT_FILE"
          # Patch URL brave-core → SearxGo-core
          sed -i \
            's|https://github.com/brave/brave-core|https://github.com/nadiaperestp83-eng/SearxGo-core|g' \
            "$GCLIENT_FILE"
          sed -i \
            's|brave/brave-core|nadiaperestp83-eng/SearxGo-core|g' \
            "$GCLIENT_FILE"
          echo "=== .gclient após patch ==="
          cat "$GCLIENT_FILE"
          # Salva path para próximos steps
          echo "GCLIENT_DIR=$(dirname $GCLIENT_FILE)" >> $GITHUB_ENV

      - name: gclient sync completo
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd "$GCLIENT_DIR"
          gclient sync \
            --no-history \
            --shallow \
            --delete_unversioned_trees \
            --reset \
            --nohooks \
            --jobs=8

      - name: Verificar estrutura src e siso
        run: |
          echo "=== src ==="
          ls -la "$GCLIENT_DIR/src/" | head -20
          echo "=== .gn ==="
          test -f "$GCLIENT_DIR/src/.gn" \
            && echo ".gn ENCONTRADO OK" \
            || (echo ".gn NAO encontrado" && exit 1)
          echo "=== build/config/siso ==="
          ls "$GCLIENT_DIR/src/build/config/siso/" 2>/dev/null \
            || echo "siso ainda nao existe"

      - name: gclient runhooks
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd "$GCLIENT_DIR"
          gclient runhooks

      - name: Escrever args.gn
        run: |
          mkdir -p "$GCLIENT_DIR/src/out/arm64"
          cat > "$GCLIENT_DIR/src/out/arm64/args.gn" << 'EOF'
          target_os = "android"
          target_cpu = "arm64"
          android_channel = "stable"
          is_debug = false
          is_official_build = true
          is_component_build = false
          symbol_level = 0
          strip_debug_info = true
          brave_rewards_enabled = false
          brave_wallet_enabled = false
          brave_news_enabled = false
          brave_sync_v2_enabled = false
          brave_vpn_enabled = false
          speedreader_enabled = false
          enable_reporting = false
          enable_crash_reporter = false
          enable_background_mode = false
          safe_browsing_mode = 0
          use_official_google_api_keys = false
          enable_google_now = false
          enable_remoting = false
          disable_omaha = true
          disable_fieldtrial_testing_config = true
          arm_use_neon = true
          use_thin_lto = true
          EOF

      - name: gn gen
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd "$GCLIENT_DIR/src"
          gn gen out/arm64

      - name: Validar search_engines target
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd "$GCLIENT_DIR/src"
          autoninja -C out/arm64 components/search_engines:search_engines

      - name: Build chrome_public_apk
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd "$GCLIENT_DIR/src"
          autoninja -C out/arm64 chrome_public_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-arm64-${{ github.sha }}
          path: ${{ env.GCLIENT_DIR }}/src/out/arm64/apks/ChromePublic.apk
          retention-days: 7
