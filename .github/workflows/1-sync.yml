name: 1 - Sync Sources

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'components/**'
      - 'browser/**'
      - 'android/**'
      - 'build/**'
      - 'chromium_src/**'
      - 'DEPS'
      - 'package.json'

jobs:
  sync:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    outputs:
      sync_done: ${{ steps.mark.outputs.sync_done }}

    steps:
      - name: Free disk space agressivo
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/share/swift /opt/microsoft /usr/local/share/boost /usr/lib/jvm /usr/share/java /usr/local/julia* /opt/pipx /opt/az /usr/share/az* /usr/share/maven /usr/share/gradle /usr/share/texlive /imagegeneration /usr/share/miniconda /usr/local/go /usr/share/rust /home/runner/.cargo /home/runner/.rustup /opt/hostedtoolcache/*
          sudo apt-get remove -y azure-cli google-cloud-cli microsoft-edge-stable firefox mono-complete powershell || true
          sudo apt-get autoremove -y && sudo apt-get clean
          docker system prune -af 2>/dev/null || true

      - name: Install Python e dependências mínimas
        run: |
          sudo apt-get update && sudo apt-get install -y python3.11 build-essential git curl lsb-release zstd
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1

      - name: Setup depot_tools e GN binário
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          rm -f $HOME/depot_tools/gn
          curl -sL "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest" -o /tmp/gn.zip
          unzip -qo /tmp/gn.zip -d $HOME/depot_tools && chmod +x $HOME/depot_tools/gn
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: Obter tag Chromium
        run: |
          git clone --depth=1 https://github.com/brave/brave-browser.git $HOME/brave-browser
          TAG=$(python3 -c "import json; print(json.load(open('$HOME/brave-browser/package.json'))['config']['projects']['chrome']['tag'])")
          echo "CHROMIUM_TAG=$TAG" >> $GITHUB_ENV
          rm -rf $HOME/brave-browser

      - name: Escrever .gclient minimalista
        run: |
          mkdir -p $HOME/searxgo-build
          cat > $HOME/searxgo-build/.gclient << GCLIENT
          solutions = [{
            "name": "src",
            "url": "https://chromium.googlesource.com/chromium/src.git@${CHROMIUM_TAG}",
            "managed": False,
            "custom_deps": {
              "src/brave": "https://github.com/nadiaperestp83-eng/SearxGo-core.git@master",
              "src/third_party/blink/web_tests": None, "src/third_party/node": None,
              "src/third_party/nodejs": None, "src/third_party/rust": None,
              "src/third_party/perfetto": None, "src/chrome/test/data": None,
              "src/content/test/data": None, "src/third_party/pdfium": None,
              "src/chrome/browser/resources/pdf": None, "src/third_party/widevine": None,
              "src/third_party/llvm-build": None, "src/tools/perf": None,
              "src/third_party/catapult": None, "src/third_party/angle": None,
            },
            "custom_vars": {
              "checkout_android": True, "checkout_android_native_support": False,
              "checkout_nacl": False, "checkout_libaom": False,
              "checkout_openxr": False, "checkout_aemu_source": False,
            },
          }]
          GCLIENT

      - name: gclient sync
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          cd $HOME/searxgo-build
          gclient sync --no-history --shallow --delete_unversioned_trees --reset --nohooks --jobs=4

      - name: Comprimir src (Limpeza Extrema)
        run: |
          cd $HOME/searxgo-build
          tar --exclude=src/.git \
              --exclude=src/third_party/blink/web_tests \
              --exclude=src/third_party/node \
              --exclude=src/chrome/test \
              --exclude=src/content/test \
              --exclude=src/third_party/catapult \
              --exclude=src/tools/perf \
              --exclude='src/**/*.pyc' \
              --exclude='src/**/__pycache__' \
              --exclude=src/out \
              -I 'zstd -T2 -19' -cf /tmp/searxgo-src.tar.zst src/
          ls -lh /tmp/searxgo-src.tar.zst

      - name: Upload src artifact
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-src
          path: /tmp/searxgo-src.tar.zst
          retention-days: 3

      - name: Marcar sync concluído
        id: mark
        run: echo "sync_done=true" >> $GITHUB_OUTPUT
