name: 2 - Build APK

on:
  workflow_run:
    workflows: ["1 - Sync Sources"]
    types: [completed]
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    # Só roda se o sync anterior passou
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/share/swift /opt/microsoft /usr/local/share/boost \
            /usr/lib/jvm /usr/share/java
          sudo apt-get clean
          df -h /

      - name: Install Python 3.11 e dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y \
            python3.11 python3.11-distutils python3.11-venv \
            build-essential git curl lsb-release openjdk-17-jdk \
            lib32stdc++6 lib32z1 pkg-config unzip nodejs npm zstd
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --set python3 /usr/bin/python3.11

      - name: Setup depot_tools e GN
        run: |
          git clone --depth=1 \
            https://chromium.googlesource.com/chromium/tools/depot_tools.git \
            $HOME/depot_tools
          rm -f $HOME/depot_tools/gn
          curl -sL "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest" \
            -o /tmp/gn.zip
          unzip -qo /tmp/gn.zip -d $HOME/depot_tools
          chmod +x $HOME/depot_tools/gn
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: Download src artifact do sync anterior
        uses: actions/download-artifact@v4
        with:
          name: searxgo-src
          path: /tmp/
          # Busca o artifact do workflow_run que disparou este build
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Extrair src
        run: |
          mkdir -p $HOME/searxgo-build
          cd $HOME/searxgo-build
          tar -I 'zstd -T0' -xf /tmp/searxgo-src.tar.zst
          echo "=== Verificando estrutura ==="
          test -f $HOME/searxgo-build/src/.gn \
            && echo ".gn OK" \
            || (echo ".gn NAO encontrado" && exit 1)
          ls $HOME/searxgo-build/src/brave/ | head -5
          df -h /

      - name: Escrever .gclient
        run: |
          cat > $HOME/searxgo-build/.gclient << 'GCLIENT'
          solutions = [
            {
              "name": "src",
              "url": "https://chromium.googlesource.com/chromium/src.git",
              "managed": False,
              "custom_deps": {
                "src/brave": "https://github.com/nadiaperestp83-eng/SearxGo-core.git@master",
              },
              "custom_vars": {
                "checkout_android": True,
              },
            },
          ]
          target_os = ["android"]
          GCLIENT

      - name: gclient runhooks
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/searxgo-build
          gclient runhooks

      - name: Escrever args.gn
        run: |
          mkdir -p $HOME/searxgo-build/src/out/arm64
          cat > $HOME/searxgo-build/src/out/arm64/args.gn << 'EOF'
          target_os = "android"
          target_cpu = "arm64"
          android_channel = "stable"
          is_debug = false
          is_official_build = true
          is_component_build = false
          symbol_level = 0
          strip_debug_info = true
          v8_enable_sandbox = false
          enable_resource_allowlist_generation = false
          enable_junit_tests = false
          brave_rewards_enabled = false
          brave_wallet_enabled = false
          brave_news_enabled = false
          brave_sync_v2_enabled = false
          brave_vpn_enabled = false
          speedreader_enabled = false
          enable_reporting = false
          enable_crash_reporter = false
          enable_background_mode = false
          safe_browsing_mode = 0
          use_official_google_api_keys = false
          enable_google_now = false
          enable_remoting = false
          disable_omaha = true
          disable_fieldtrial_testing_config = true
          arm_use_neon = true
          use_thin_lto = true
          is_cfi = false
          EOF

      - name: gn gen
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/searxgo-build/src
          gn gen out/arm64

      - name: Build chrome_public_apk
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/searxgo-build/src
          autoninja -C out/arm64 -j 4 chrome_public_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-arm64-${{ github.sha }}
          path: $HOME/searxgo-build/src/out/arm64/apks/ChromePublic.apk
          retention-days: 7

      - name: Notificar conclusão
        if: always()
        run: |
          if [ -f "$HOME/searxgo-build/src/out/arm64/apks/ChromePublic.apk" ]; then
            echo "✅ APK gerado com sucesso"
            ls -lh $HOME/searxgo-build/src/out/arm64/apks/ChromePublic.apk
          else
            echo "❌ APK NAO gerado — verifique logs do build"
            exit 1
          fi
