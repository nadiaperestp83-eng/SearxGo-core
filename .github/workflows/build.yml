name: SearxGo Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install Python 3.11 e dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y \
            python3.11 \
            python3.11-distutils \
            python3.11-venv \
            build-essential \
            git \
            curl \
            lsb-release \
            openjdk-17-jdk \
            lib32stdc++6 \
            lib32z1 \
            pkg-config \
            unzip \
            nodejs \
            npm
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --set python3 /usr/bin/python3.11
          python3 --version

      - name: Setup depot_tools e GN binário
        run: |
          git clone --depth=1 \
            https://chromium.googlesource.com/chromium/tools/depot_tools.git \
            $HOME/depot_tools

          rm -f $HOME/depot_tools/gn
          curl -sL "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest" \
            -o /tmp/gn.zip
          unzip -qo /tmp/gn.zip -d $HOME/depot_tools
          chmod +x $HOME/depot_tools/gn

          echo "$HOME/depot_tools" >> $GITHUB_PATH
          export PATH="$HOME/depot_tools:$PATH"
          gn --version
          gclient --version

      - name: Clonar brave-browser (raiz com DEPS completo)
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          # brave-browser contém o DEPS que puxa Chromium + brave-core
          git clone --depth=1 \
            https://github.com/brave/brave-browser.git \
            $HOME/brave-browser
          echo "--- Conteúdo raiz ---"
          ls -la $HOME/brave-browser/
          echo "--- DEPS existe? ---"
          test -f $HOME/brave-browser/DEPS && echo "DEPS OK" || echo "DEPS NAO EXISTE"

      - name: Patch DEPS — substitui brave-core pelo SearxGo-core
        run: |
          cd $HOME/brave-browser
          # Mostra linha original antes do patch
          grep -n "brave-core\|brave/brave-core" DEPS | head -5 || true
          # Substitui URL do brave-core pelo fork
          sed -i \
            's|https://github.com/brave/brave-core|https://github.com/nadiaperestp83-eng/SearxGo-core|g' \
            DEPS
          # Substitui também referência sem https
          sed -i \
            's|brave/brave-core@|nadiaperestp83-eng/SearxGo-core@|g' \
            DEPS
          # Confirma patch
          echo "--- Após patch ---"
          grep -n "SearxGo-core\|brave-core" DEPS | head -5 || true

      - name: Escrever .gclient na raiz do brave-browser
        run: |
          cd $HOME/brave-browser
          # O .gclient deve ficar UM NÍVEL acima do src
          # brave-browser já tem o script init.py que gera o .gclient
          # Geramos manualmente para garantir
          cat > $HOME/brave-browser/.gclient << 'EOF'
          solutions = [
            {
              "name"        : "src",
              "url"         : "https://chromium.googlesource.com/chromium/src.git",
              "deps_file"   : ".DEPS.git",
              "managed"     : False,
              "custom_deps" : {
                "src/brave": "https://github.com/nadiaperestp83-eng/SearxGo-core.git@master",
              },
              "custom_vars": {},
            },
          ]
          target_os = ["android"]
          EOF
          echo "--- .gclient ---"
          cat $HOME/brave-browser/.gclient

      - name: gclient sync (Chromium completo + SearxGo-core)
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/brave-browser
          gclient sync \
            --no-history \
            --shallow \
            --delete_unversioned_trees \
            --reset \
            --nohooks \
            --jobs=8

      - name: Verificar estrutura src
        run: |
          echo "--- src ---"
          ls -la $HOME/brave-browser/src/ | head -20
          echo "--- .gn ---"
          test -f $HOME/brave-browser/src/.gn \
            && echo ".gn ENCONTRADO OK" \
            || (echo ".gn NAO encontrado — abortando" && exit 1)
          echo "--- brave dentro de src ---"
          ls -la $HOME/brave-browser/src/brave/ | head -10 || echo "brave NAO existe"
          echo "--- build/config/siso ---"
          ls $HOME/brave-browser/src/build/config/siso/ 2>/dev/null || echo "siso NAO existe"

      - name: gclient runhooks
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/brave-browser
          gclient runhooks

      - name: Escrever args.gn
        run: |
          mkdir -p $HOME/brave-browser/src/out/arm64
          cat > $HOME/brave-browser/src/out/arm64/args.gn << 'EOF'
          target_os = "android"
          target_cpu = "arm64"
          android_channel = "stable"
          is_debug = false
          is_official_build = true
          is_component_build = false
          symbol_level = 0
          strip_debug_info = true
          brave_rewards_enabled = false
          brave_wallet_enabled = false
          brave_news_enabled = false
          brave_sync_v2_enabled = false
          brave_vpn_enabled = false
          speedreader_enabled = false
          enable_reporting = false
          enable_crash_reporter = false
          enable_background_mode = false
          safe_browsing_mode = 0
          use_official_google_api_keys = false
          enable_google_now = false
          enable_remoting = false
          disable_omaha = true
          disable_fieldtrial_testing_config = true
          arm_use_neon = true
          use_thin_lto = true
          EOF

      - name: gn gen
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/brave-browser/src
          gn gen out/arm64

      - name: Validar search_engines target
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/brave-browser/src
          autoninja -C out/arm64 components/search_engines:search_engines

      - name: Build chrome_public_apk
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          export DEPOT_TOOLS_UPDATE=0
          cd $HOME/brave-browser/src
          autoninja -C out/arm64 chrome_public_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-arm64-${{ github.sha }}
          path: $HOME/brave-browser/src/out/arm64/apks/ChromePublic.apk
          retention-days: 7
