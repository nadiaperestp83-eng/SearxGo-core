name: SearxGo Android Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      DEPOT_TOOLS_PATH: ${{ github.workspace }}/depot_tools

    steps:
      - name: Checkout brave-core fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            python3-pip \
            git \
            curl \
            lsb-release \
            openjdk-17-jdk \
            lib32stdc++6 \
            lib32z1 \
            libncurses5 \
            pkg-config \
            mesa-common-dev

      - name: Clone depot_tools
        run: |
          git clone --depth=1 \
            https://chromium.googlesource.com/chromium/tools/depot_tools.git \
            ${{ github.workspace }}/depot_tools

      - name: Add depot_tools ao PATH (permanente para todos os steps)
        run: |
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH

      - name: Verificar gn e ninja no PATH
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          which gn
          which ninja
          gn --version
          ninja --version

      - name: Configurar gclient
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          cd ${{ github.workspace }}
          gclient config \
            --name=src/brave \
            --unmanaged \
            https://github.com/${{ github.repository }}

      - name: gclient sync
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          cd ${{ github.workspace }}
          gclient sync \
            --no-history \
            --shallow \
            --delete_unversioned_trees \
            --reset \
            --nohooks

      - name: Rodar hooks
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          cd ${{ github.workspace }}
          gclient runhooks

      - name: Escrever args.gn
        run: |
          mkdir -p ${{ github.workspace }}/src/out/arm64
          cat > ${{ github.workspace }}/src/out/arm64/args.gn << 'EOF'
          target_os = "android"
          target_cpu = "arm64"
          android_channel = "stable"
          is_debug = false
          is_official_build = true
          is_component_build = false
          symbol_level = 0
          strip_debug_info = true
          brave_rewards_enabled = false
          brave_wallet_enabled = false
          brave_news_enabled = false
          brave_sync_v2_enabled = false
          brave_vpn_enabled = false
          speedreader_enabled = false
          enable_reporting = false
          enable_crash_reporter = false
          enable_background_mode = false
          safe_browsing_mode = 0
          use_official_google_api_keys = false
          enable_google_now = false
          enable_remoting = false
          disable_omaha = true
          disable_fieldtrial_testing_config = true
          arm_use_neon = true
          use_thin_lto = true
          EOF

      - name: gn gen
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          cd ${{ github.workspace }}/src
          gn gen out/arm64

      - name: Validar target search_engines
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          cd ${{ github.workspace }}/src
          autoninja -C out/arm64 components/search_engines:search_engines

      - name: Build chrome_public_apk
        run: |
          export PATH="${{ github.workspace }}/depot_tools:$PATH"
          cd ${{ github.workspace }}/src
          autoninja -C out/arm64 chrome_public_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-arm64-${{ github.sha }}
          path: ${{ github.workspace }}/src/out/arm64/apks/ChromePublic.apk
          retention-days: 7
