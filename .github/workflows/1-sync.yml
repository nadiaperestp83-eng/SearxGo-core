name: 1 - Sync Sources

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'components/**'
      - 'browser/**'
      - 'android/**'
      - 'build/**'
      - 'chromium_src/**'
      - 'DEPS'
      - 'package.json'

jobs:
  sync:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    outputs:
      sync_done: ${{ steps.mark.outputs.sync_done }}

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/share/swift /opt/microsoft /usr/local/share/boost \
            /usr/lib/jvm /usr/share/java
          sudo apt-get clean
          df -h /

      - name: Install Python 3.11
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y \
            python3.11 python3.11-distutils python3.11-venv \
            build-essential git curl lsb-release \
            lib32stdc++6 lib32z1 pkg-config unzip nodejs npm zstd
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --set python3 /usr/bin/python3.11

      - name: Setup depot_tools e GN
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH
          export PATH="$HOME/depot_tools:$PATH"

      - name: Clonar brave-browser
        run: |
          git clone --depth=1 https://github.com/brave/brave-browser.git $HOME/brave-browser
          CHROMIUM_TAG=$(python3 -c "import json; d = json.load(open('$HOME/brave-browser/package.json')); print(d.get('config',{}).get('projects',{}).get('chrome',{}).get('tag',''))")
          echo "CHROMIUM_TAG=$CHROMIUM_TAG" >> $GITHUB_ENV

      - name: Escrever .gclient (Minimalista)
        run: |
          mkdir -p $HOME/searxgo-build
          cat > $HOME/searxgo-build/.gclient << GCLIENT
          solutions = [
            {
              "name": "src",
              "url": "https://chromium.googlesource.com/chromium/src.git@${CHROMIUM_TAG}",
              "managed": False,
              "custom_deps": {
                "src/brave": "https://github.com/nadiaperestp83-eng/SearxGo-core.git@master",
                "src/third_party/blink/web_tests": None,
                "src/third_party/node": None,
                "src/third_party/nodejs": None,
                "src/third_party/rust": None,
                "src/third_party/perfetto": None,
                "src/chrome/test/data": None,
                "src/content/test/data": None,
                "src/third_party/angle/third_party/glslang": None,
                "src/third_party/llvm-build": None,
                "src/chrome/browser/resources/pdf": None,
                "src/third_party/pdfium": None,
              },
              "custom_vars": {"checkout_android": True},
            },
          ]
          target_os = ["android"]
          GCLIENT

      - name: gclient sync (Resiliente)
        run: |
          export PATH="$HOME/depot_tools:$PATH"
          cd $HOME/searxgo-build
          # jobs=2 evita gargalo de rede e thrashing de CPU
          gclient sync --no-history --shallow --delete_unversioned_trees --reset --nohooks --jobs=2

      - name: Comprimir src (Compressão Rápida)
        run: |
          cd $HOME/searxgo-build
          # -T2 limita threads de compressão, --memory=1024 evita OOM Killer
          tar -I 'zstd -T2 -3 --memory=1024' -cf /tmp/searxgo-src.tar.zst src/

      - name: Upload src artifact
        uses: actions/upload-artifact@v4
        with:
          name: searxgo-src
          path: /tmp/searxgo-src.tar.zst
          retention-days: 3

      - name: Marcar sync concluído
        id: mark
        run: echo "sync_done=true" >> $GITHUB_OUTPUT
